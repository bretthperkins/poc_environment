version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: local_postgres
    restart: always
    
    # 1. Configuration & Security
    environment:
      POSTGRES_USER: ${DB_USER:-dev_user}
      # The .env file will override this default value locally
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-dev_db}
    
    # 2. Port Isolation (Maps host 5432 to container 5432)
    ports:
      - "${DB_PORT:-5432}:5432"
    
    # 3. Storage Layer (Decoupled named volume)
    volumes:
      - postgres_enterprise_data:/var/lib/postgresql/data
      # Optional: Mounts a local directory to auto-run SQL scripts on startup
      - ./init-scripts:/docker-entrypoint-initdb.d
    
    # 4. Networking Isolation
    networks:
      - database_net

    # 5. Resource Management (Crucial for MacBook Air battery/CPU balance)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M

    # 6. High Availability & Readiness Detection
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dev_user} -d ${DB_NAME:-dev_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_enterprise_data:
    name: enterprise_stack_postgres_volume

networks:
  database_net:
    name: enterprise_database_network
    driver: bridge