name: poc-stack

services:
  # The Database Layer
  postgres:
    image: postgres:17
    container_name: poc_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Official Postgres image uses POSTGRES_DB to create the initial database
      POSTGRES_DB: ${DB_INSTANCE}
      # Keep POSTGRES_INSTANCE for compatibility with the app config
      POSTGRES_INSTANCE: ${DB_INSTANCE}
    ports:
      # Bind Postgres to localhost using only DB_PORT (simplified)
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_INSTANCE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Node.js API Layer
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REPO_URL: ${REPO_URL:-https://github.com/bretthperkins/poc_nodejs}
        REPO_BRANCH: ${REPO_BRANCH:-main}
        CACHEBUST: ${CACHEBUST:-0}
    container_name: poc_node_api
    ports:
      # Host port 3000 -> container port configured by API_PORT (default 3000)
      - "3000:${API_PORT:-3000}"
    environment:
      NODE_ENV: production
      # Ensure the app binds to the expected container port
      PORT: ${API_PORT:-3000}
      API_PORT: ${API_PORT:-3000}
      DB_SERVER_PORT: ${DB_SERVER_PORT}
      DB_SERVER_HOST: ${DB_SERVER_HOST}
      DB_SERVER_USER: ${DB_SERVER_USER}
      DB_SERVER_PASSWORD: ${DB_SERVER_PASSWORD}
      DB_SERVER_INSTANCE: ${DB_SERVER_INSTANCE}
      POSTGRES_PORT: ${DB_SERVER_PORT}
      POSTGRES_HOST: ${DB_SERVER_HOST}
      POSTGRES_USER: ${DB_SERVER_USER}
      POSTGRES_PASSWORD: ${DB_SERVER_PASSWORD}
      POSTGRES_INSTANCE: ${DB_SERVER_INSTANCE}
    depends_on:
      postgres:
        condition: service_healthy
        
volumes:
  pgdata:
