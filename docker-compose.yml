name: poc-stack

services:
  # The Database Layer
  api_postgres:
    image: postgres:17
    container_name: api_postgres
    environment:
      POSTGRES_USER: ${API_DB_USER}
      POSTGRES_PASSWORD: ${API_DB_PASSWORD}
      # Official Postgres image uses POSTGRES_DB to create the initial database
      POSTGRES_DB: ${API_DB_INSTANCE}
      # Keep POSTGRES_INSTANCE for compatibility with the app config
      POSTGRES_INSTANCE: ${API_DB_INSTANCE}
    ports:
      # Bind Postgres to localhost using only API_DB_PORT (simplified)
      - "127.0.0.1:${API_DB_PORT:-5432}:5432"
    volumes:
      - api_pgdata:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d/api:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${API_DB_USER} -d ${API_DB_INSTANCE}"]
      interval: 5s
      timeout: 5s
      retries: 5
  auth_postgres:
    image: postgres:17
    container_name: auth_postgres
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      # Official Postgres image uses POSTGRES_DB to create the initial database
      POSTGRES_DB: ${AUTH_DB_INSTANCE}
      # Keep POSTGRES_INSTANCE for compatibility with the app config
      POSTGRES_INSTANCE: ${AUTH_DB_INSTANCE}
    ports:
      # Bind Postgres to localhost using only AUTH_DB_PORT (simplified)
      - "127.0.0.1:${AUTH_DB_PORT:-5433}:5432"
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d/auth:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_INSTANCE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The Node.js API Layer
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REPO_URL: ${REPO_URL:-https://github.com/bretthperkins/poc_nodejs}
        REPO_BRANCH: ${REPO_BRANCH:-main}
        CACHEBUST: ${CACHEBUST:-0}
    container_name: poc_node_api
    ports:
      # Host port 3000 -> container port configured by API_PORT (default 3000)
      - "3000:${API_PORT:-3000}"
    environment:
      NODE_ENV: production
      REPO_URL: ${REPO_URL:-https://github.com/bretthperkins/poc_nodejs}
      REPO_BRANCH: ${REPO_BRANCH:-main}
      # Ensure the app binds to the expected container port
      PORT: ${API_PORT:-3000}
      API_PORT: ${API_PORT:-3000}
      API_DB_SERVER_PORT: ${API_DB_SERVER_PORT}
      API_DB_SERVER_HOST: ${API_DB_SERVER_HOST}
      API_DB_SERVER_USER: ${API_DB_SERVER_USER}
      API_DB_SERVER_PASSWORD: ${API_DB_SERVER_PASSWORD}
      API_DB_SERVER_INSTANCE: ${API_DB_SERVER_INSTANCE}
      KEYCLOAK_AUTH_SERVER_URL: ${API_AUTH_SERVER_URL}
      KEYCLOAK_AUTH_ISSUER_URL: ${API_AUTH_ISSUER_URL}
      KEYCLOAK_CLIENT_ID: ${API_AUTH_CLIENT_ID}
      KEYCLOAK_REALM: ${API_AUTH_REALM}
    depends_on:
      api_postgres:
        condition: service_healthy
      auth_postgres:
        condition: service_healthy

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: ${AUTH_DB}
      KC_DB_URL_HOST: ${AUTH_DB_HOST}
      # Container-to-container traffic must use postgres' internal port
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${AUTH_DB_INSTANCE}
      KC_DB_USERNAME: ${AUTH_DB_USER}
      KC_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      KC_HOSTNAME: ${AUTH_HOSTNAME}
      KC_HOSTNAME_PORT: ${AUTH_HOSTNAME_PORT}
      KC_HOSTNAME_STRICT: ${AUTH_HOSTNAME_STRICT}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      auth_postgres:
        condition: service_healthy

volumes:
  api_pgdata:
  auth_pgdata:
